<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>술기록</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <main class="receipt">
    <header class="receipt-header">
      <h1>술기록</h1>
      <p class="subtitle">오늘의 음주 기록으로 내일의 상태를 예상해보세요.</p>
    </header>

    <form id="drinkForm" class="form">
      <div class="form-row">
        <label for="drinkType">술 종류</label>
        <select id="drinkType" name="drinkType">
          <option value="soju" data-percent="16">소주</option>
          <option value="beer" data-percent="5">맥주</option>
          <option value="wine" data-percent="13">와인</option>
          <option value="makgeolli" data-percent="6">막걸리</option>
          <option value="liquor" data-percent="40">양주</option>
          <option value="highball" data-percent="8">하이볼</option>
          <option value="custom" data-percent="">직접 입력</option>
        </select>
      </div>

      <div class="form-row">
        <label for="percent">알코올 도수 (%)</label>
        <input type="number" id="percent" name="percent" min="0" max="100" step="0.1" />
        <div class="error" id="error-percent"></div>
      </div>

      <div class="form-row">
        <label for="volume">섭취량 (ml)</label>
        <input type="number" id="volume" name="volume" min="0" step="1" />
        <div class="error" id="error-volume"></div>
      </div>

      <div class="form-row">
        <label for="hours">음주 시간 (시간)</label>
        <input type="number" id="hours" name="hours" min="0" step="0.1" />
        <div class="error" id="error-hours"></div>
      </div>

      <div class="form-row">
        <label for="weight">체중 (kg)</label>
        <input type="number" id="weight" name="weight" min="0" step="0.1" />
        <div class="error" id="error-weight"></div>
      </div>

      <div class="form-row inline">
        <span>성별</span>
        <label><input type="radio" name="sex" value="male"> 남성</label>
        <label><input type="radio" name="sex" value="female"> 여성</label>
        <div class="error" id="error-sex"></div>
      </div>

      <div class="form-row inline">
        <span>공복 여부</span>
        <label><input type="radio" name="emptyStomach" value="fasting"> 공복</label>
        <label><input type="radio" name="emptyStomach" value="fed"> 식사 후</label>
      </div>

      <div class="form-actions">
        <button type="button" id="calculateBtn" class="btn primary">계산하기</button>
        <button type="button" id="resetBtn" class="btn">초기화</button>
      </div>

      <div id="form-error" class="form-error" aria-live="polite"></div>
    </form>

    <section id="result" class="result" hidden>
      <h2>계산 결과</h2>
      <div class="result-grid">
        <div><strong>순수 알코올 섭취량</strong><div id="alcGrams">-- g</div></div>
        <div><strong>예상 BAC</strong><div id="bac">-- %</div></div>
        <div><strong>숙취 지수</strong><div id="level">--</div></div>
        <div><strong>단계 이름</strong><div id="levelName">--</div></div>
        <div><strong>예상 알코올 해소 시간</strong><div id="elimination">-- 시간</div></div>
      </div>

      <div class="caution" id="emptyWarning" hidden></div>

      <div class="guide">
        <h3>숙취 관리 가이드</h3>
        <ul id="guideList"></ul>
      </div>

      <p class="safety">이 결과는 입력값을 기반으로 한 단순 추정치이며 실제 혈중알코올농도, 숙취 정도, 알코올 분해 속도는 개인의 건강 상태와 음주 상황에 따라 달라질 수 있습니다. 계산 결과와 관계없이 음주 후에는 운전하지 마세요.</p>
    </section>
  </main>
</body>
</html>
